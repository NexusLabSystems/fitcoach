<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem conexão — FitCoach</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #f9fafb;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 24px;
        border: 1px solid #e5e7eb;
        padding: 40px 32px;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        background: #fff3ee;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      h1 { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 8px; }
      p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #FF5722;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        font-family: inherit;
      }
      .btn:hover { background: #E64A19; }
      .status {
        margin-top: 20px;
        font-size: 12px;
        color: #9ca3af;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 6px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF5722" stroke-width="1.8" stroke-linecap="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
        </svg>
      </div>
      <h1>Você está offline</h1>
      <p>Sem conexão com a internet. Verifique sua rede e tente novamente.</p>
      <button class="btn" onclick="tryReconnect()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
        Tentar novamente
      </button>
      <p class="status">
        <span class="dot"></span>
        Sem conexão
      </p>
    </div>
    <script>
      function tryReconnect() {
        if (navigator.onLine) {
          window.location.href = "/";
        } else {
          window.location.reload();
        }
      }
      window.addEventListener("online", () => {
        window.location.href = "/";
      });
    </script>
  </body>
</html>
